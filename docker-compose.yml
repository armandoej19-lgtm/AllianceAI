# ==============================================================================
# AllianceAI — Docker Compose
#
#   docker compose up -d --build      # build + start in background
#   docker compose logs -f            # watch logs / find the Jupyter URL
#   docker compose down               # stop
#
# Secrets come from your .env file (LLM_PROVIDER, OPENROUTER_API_KEY, etc.) —
# Compose loads it automatically via `env_file`. The DuckDB prediction store,
# reports, and logs are mounted as named volumes so they SURVIVE rebuilds —
# this is what lets the AI keep learning across container restarts.
# ==============================================================================
services:
  allianceai:
    build:
      context: .
      # Build with the host network so pip can resolve PyPI. The host's DNS
      # is Tailscale MagicDNS; the daemon's default build network can't reach
      # public DNS, which otherwise fails `pip install` during the build.
      network: host
    image: allianceai:latest
    container_name: allianceai
    restart: unless-stopped
    # This host's DNS is managed entirely by Tailscale MagicDNS (100.100.100.100),
    # and this network blocks direct public DNS (8.8.8.8/1.1.1.1). The Tailscale
    # CGNAT resolver is NOT routable from a Docker bridge subnet, so the container
    # can't resolve anything on its own bridge network. Sharing the host's network
    # namespace lets the container use the host's working DNS directly.
    #
    # Note: with host networking the `ports:` mapping is ignored — JupyterLab
    # binds 8888 directly on the host. Linux-only (fine on Alpine).
    network_mode: host
    env_file:
      - .env                   # API keys + provider config
    environment:
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:-allianceai}"
      # Keep the learning DB on the persistent volume, not the ephemeral layer.
      DB_PATH: "/app/data/allianceai.duckdb"
    volumes:
      - allianceai_data:/app/data   # persists allianceai.duckdb (the learning store)
      - ./reports:/app/reports      # reports readable on the host
      - ./notebooks:/app/notebooks  # your notebooks, editable on the host

volumes:
  allianceai_data:
